{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - StudyOptimizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-white via-red-50/30 to-orange-50/20 flex flex-col items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
        <div class="text-center mb-10">
            <a class="inline-flex items-center gap-3 mb-6 group" href="/">
                <img src="{% static 'main/images/app-logo-v1.svg' %}" alt="Logo" class="w-16 h-16 object-contain transition-transform group-hover:scale-110">
                <span class="text-2xl font-bold text-gray-900 tracking-tight">StudyOptimizer</span>
            </a>
            <h1 class="text-4xl font-extrabold text-gray-900 mb-2">Reset Password 🔑</h1>
            <p class="text-gray-500 font-medium">Enter your email and we'll send you a recovery link</p>
        </div>

        <div class="bg-white p-10 rounded-[2.5rem] border-2 border-gray-100 shadow-2xl relative overflow-hidden">
            <div class="absolute -top-12 -right-12 w-24 h-24 bg-red-50 rounded-full blur-3xl opacity-50"></div>
            <div class="absolute -bottom-12 -left-12 w-24 h-24 bg-orange-50 rounded-full blur-3xl opacity-50"></div>

            <form method="POST" class="space-y-6 relative">
                {% csrf_token %}
                <div class="space-y-2">
                    <label for="id_email" class="text-sm font-bold text-gray-700 ml-1">Email Address</label>
                    <div class="relative group">
                        <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400 transition-colors group-focus-within:text-red-500"></i>
                        <input type="email" name="email" id="id_email" placeholder="you@example.com" required
                               class="w-full pl-12 pr-4 py-4 bg-gray-50/50 border-2 border-gray-100 rounded-2xl focus:border-red-500 focus:bg-white outline-none transition-all placeholder:text-gray-400">
                    </div>
                </div>

                <button type="submit"
                        class="w-full bg-gray-900 text-white font-bold py-5 rounded-2xl shadow-lg shadow-gray-200 hover:shadow-xl hover:shadow-red-200/50 hover:bg-gray-800 transition-all flex items-center justify-center gap-2 group mt-8">
                    <span>Send Reset Link 📧</span>
                    <i data-lucide="arrow-right" class="w-5 h-5 group-hover:translate-x-1 transition-transform"></i>
                </button>
            </form>

            <div class="mt-8 text-center">
                <p class="text-sm text-gray-500 font-medium">
                    Remembered it? 
                    <a href="{% url 'login' %}" class="text-red-600 font-bold hover:underline decoration-2 underline-offset-4">
                        Back to login
                    </a>
                </p>
            </div>
        </div>

        <p class="mt-8 text-center text-xs text-gray-400 font-medium">
            &copy; 2026 StudyOptimizer. All rights reserved.
        </p>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
